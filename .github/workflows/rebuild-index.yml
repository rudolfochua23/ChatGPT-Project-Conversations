name: Rebuild Index & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'logs/**'

permissions:
  contents: write

jobs:
  rebuild-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Rebuild conversations index
        run: npm run build

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/conversations.json
          git diff --cached --quiet && echo "No index changes" && exit 0
          git commit -m "Auto-rebuild conversation index"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-chats:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
