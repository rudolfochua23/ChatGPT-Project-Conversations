# Development Docker Compose
# Copy to docker-compose.dev.yml and create .env.dev from .env.example
# Usage: make dev

services:
  db:
    image: postgres:16-alpine
    container_name: chatpileai-dev-db
    environment:
      POSTGRES_DB: aichats
      POSTGRES_USER: aichats
      POSTGRES_PASSWORD: aichats_dev
    volumes:
      - chatpileai-dev-pgdata:/var/lib/postgresql/data
    networks:
      - chatpileai-dev-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichats"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development

    container_name: chatpileai-dev

    ports:
      - "4287:4173"

    env_file:
      - .env.dev

    environment:
      - NODE_ENV=development
      - PORT=4173
      - DATABASE_URL=postgresql://aichats:aichats_dev@db:5432/aichats

    volumes:
      - ./app:/app/app
      - ./server.js:/app/server.js
      - ./db.js:/app/db.js

    networks:
      - chatpileai-dev-net

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4173/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chatpileai-dev-pgdata:
    name: chatpileai-dev-pgdata

networks:
  chatpileai-dev-net:
    name: chatpileai-dev-net
