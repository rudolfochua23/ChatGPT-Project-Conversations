# Production Docker Compose (Komodo / Traefik)
# Copy to docker-compose.komodo.yml and set env vars in your deployment platform
#
# Required environment variables (set in Komodo Environment section):
#   SESSION_SECRET        — random 64+ char string
#   PG_PASSWORD           — strong PostgreSQL password
#   COOKIE_DOMAIN         — your production domain (e.g. chatpileai.example.com)
#   APP_ADMIN_USERNAME    — initial admin username
#   APP_ADMIN_EMAIL       — initial admin email
#   APP_ADMIN_PASSWORD    — initial admin password (12+ chars)
#   APP_URL               — full URL (e.g. https://chatpileai.example.com)
#   DOCKER_IMAGE          — Docker Hub image (e.g. youruser/chatpileai:latest)
#
# Optional:
#   PG_USER               — PostgreSQL user (default: aichats)
#   SMTP_HOST/PORT/USER/PASS/FROM — for email verification & password reset

services:
  db:
    image: postgres:16-alpine
    container_name: chatpileai-prod-db
    environment:
      - POSTGRES_DB=aichats
      - POSTGRES_USER=${PG_USER:-aichats}
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
    volumes:
      - chatpileai-prod-pgdata:/var/lib/postgresql/data
    networks:
      - chatpileai-prod-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-aichats}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_IMAGE:-your-dockerhub-username/chatpileai:latest}

    container_name: chatpileai-prod

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatpileai.rule=Host(`${COOKIE_DOMAIN:?COOKIE_DOMAIN is required}`)"
      - "traefik.http.routers.chatpileai.entrypoints=websecure"
      - "traefik.http.routers.chatpileai.tls=true"
      - "traefik.http.routers.chatpileai.tls.certresolver=letsencrypt"
      - "traefik.http.services.chatpileai.loadbalancer.server.port=4173"

    environment:
      - NODE_ENV=production
      - PORT=4173
      - DATABASE_URL=postgresql://${PG_USER:-aichats}:${PG_PASSWORD:?PG_PASSWORD is required}@db:5432/aichats
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - COOKIE_SECURE=true
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:?COOKIE_DOMAIN is required}
      - APP_ADMIN_USERNAME=${APP_ADMIN_USERNAME:?APP_ADMIN_USERNAME is required}
      - APP_ADMIN_EMAIL=${APP_ADMIN_EMAIL:-admin@localhost}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_URL=${APP_URL:?APP_URL is required}

    networks:
      - chatpileai-prod-net
      - proxy

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4173/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chatpileai-prod-pgdata:
    name: chatpileai-prod-pgdata

networks:
  chatpileai-prod-net:
    name: chatpileai-prod-net
  proxy:
    external: true
